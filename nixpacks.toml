# KONFIGURASI DEPLOYMENT

[phases.setup]
# Paket PHP 8.2 dan ekstensi yang dibutuhkan aplikasi
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_pgsql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "nodejs_20", "composer"]

[phases.build]
# Perintah yang dijalankan saat proses build aplikasi
cmds = ["composer install --no-dev", "npm install", "npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
# Perintah untuk menjalankan server Laravel
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
